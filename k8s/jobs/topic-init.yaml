metadata:
  namespace: nyc-taxi

apiVersion: batch/v1
kind: Job
metadata:
  name: topic-init
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: topic-init
        image: nyc-pipeline-tools:k8s
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          wait-kafka svc-kafka:9092
          exec python3 /opt/project/scripts/create_kafka_topics.py \
            --bootstrap-server svc-kafka:9092 \
            --partitions "${TOPIC_PARTITIONS:-3}" \
            --replication-factor "${TOPIC_REPLICATION:-1}"
        volumeMounts:
        - name: project-files
          mountPath: /opt/project
      volumes:
      - name: project-files
        persistentVolumeClaim:
          claimName: project-files-pvc
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi
  backoffLimit: 3
