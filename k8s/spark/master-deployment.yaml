apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: spark-master
  name: spark-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
      - command:
        - /opt/spark/bin/spark-class
        - org.apache.spark.deploy.master.Master
        - --host
        - 0.0.0.0
        - --port
        - "7077"
        - --webui-port
        - "8081"
        image: apache/spark:3.5.1
        imagePullPolicy: IfNotPresent
        name: spark-master
        ports:
        - containerPort: 7077
          protocol: TCP
        - containerPort: 8081
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
