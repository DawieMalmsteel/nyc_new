kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kind
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30080
    hostPort: 38080
    protocol: TCP
  - containerPort: 30088
    hostPort: 38088
    protocol: TCP
  - containerPort: 30081
    hostPort: 38081
    protocol: TCP
  - containerPort: 30082
    hostPort: 38082
    protocol: TCP
  - containerPort: 39000
    hostPort: 39000
