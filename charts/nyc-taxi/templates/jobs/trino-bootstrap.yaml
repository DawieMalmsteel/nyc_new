apiVersion: batch/v1
kind: Job
metadata:
  namespace: nyc-taxi
  name: trino-bootstrap
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: kind-worker
      containers:
      - name: trino-bootstrap
        image: nyc-pipeline-tools:k8s
        imagePullPolicy: IfNotPresent
        command:
        - "entrypoint-trino-bootstrap"
        env:
        - name: TRINO_HOST
          value: svc-trino
        - name: TRINO_PORT
          value: "8080"
        - name: TRINO_USE_SSL
          value: "false"
        - name: S3_MODE
          value: "true"
        - name: AWS_ACCESS_KEY_ID
          value: minio
        - name: AWS_SECRET_ACCESS_KEY
          value: minio123
        - name: AWS_ENDPOINT_URL
          value: http://svc-minio:9000
        - name: SILVER_PATH
          value: s3://nyc-silver/trips
        - name: QUARANTINE_PATH
          value: s3://nyc-quarantine/invalid_trips
        - name: ZONES_PATH
          value: s3://nyc-lookup/
        volumeMounts:
        - name: project-files
          mountPath: /opt/project
      volumes:
      - name: project-files
        persistentVolumeClaim:
          claimName: project-files-pvc
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  backoffLimit: 3
