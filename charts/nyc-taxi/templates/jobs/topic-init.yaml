apiVersion: batch/v1
kind: Job
metadata:
  name: topic-init
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: topic-init
        image: nyc-pipeline-tools:k8s
        imagePullPolicy: IfNotPresent
        command: ["entrypoint-topic-init"]
        volumeMounts:
        - name: project-files
          mountPath: /opt/project
      volumes:
      - name: project-files
        persistentVolumeClaim:
          claimName: project-files-pvc
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi
  backoffLimit: 3
