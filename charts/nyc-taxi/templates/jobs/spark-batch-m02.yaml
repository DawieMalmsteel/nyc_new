apiVersion: batch/v1
kind: Job
metadata:
  name: spark-batch-m02
  labels:
    app: spark-batch
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: kind-worker
      securityContext:
        runAsUser: 0
      containers:
      - name: spark-batch-m02
        image: apache/spark:3.5.1
        imagePullPolicy: IfNotPresent
        command:
        - /opt/spark/bin/spark-submit
        args:
        - --master
        - local[*]
        - --packages
        - org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
        - --conf
        - spark.jars.ivy=/opt/project/.ivy2
        - --conf
        - spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version=2
        - --conf
        - spark.scheduler.mode=FAIR
        - /opt/project/jobs/spark_local_batch.py
        - --input
        - s3a://nyc-raw/yellow_taxi/year=2024/month=02/yellow_tripdata_2024-02.parquet
        - --lookup
        - s3a://nyc-lookup/taxi_zone_lookup.csv
        - --silver
        - s3a://nyc-silver/trips
        - --quarantine
        - s3a://nyc-quarantine/invalid_trips
        env:
        - name: MINIO_ENDPOINT
          value: http://svc-minio:9000
        - name: MINIO_ACCESS_KEY
          value: minio
        - name: MINIO_SECRET_KEY
          value: minio123
        volumeMounts:
        - name: project-files
          mountPath: /opt/project
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
      volumes:
      - name: project-files
        persistentVolumeClaim:
          claimName: project-files-pvc
  backoffLimit: 2
