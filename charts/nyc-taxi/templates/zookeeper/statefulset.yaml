apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: nyc-taxi
  name: zookeeper
  namespace: nyc-taxi
spec:
  replicas: 1
  serviceName: svc-zookeeper
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2181
              name: client
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data-zookeeper
              mountPath: /var/lib/zookeeper/data
      volumes:
        - name: data-zookeeper
          emptyDir: {}
